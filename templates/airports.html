{% extends "base.html" %}
{% block title %}机场管理 - Surge Monitor{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">机场管理</h1>
  <div style="display:flex;gap:8px">
    <button id="refresh-entry-btn" class="range-btn" onclick="refreshEntryInfo()" style="font-size:12px">刷新入口数据</button>
    <button class="ai-btn" onclick="showAddModal()">+ 添加机场</button>
  </div>
</div>

<div id="airport-list" class="loading">加载中...</div>

<!-- Add Airport Modal -->
<div class="ai-modal-backdrop" id="add-backdrop">
  <div class="ai-modal" style="width:min(560px,92vw)">
    <div class="ai-modal-head">
      <h4>添加机场</h4>
      <button class="ai-modal-close" onclick="closeAddModal()">&#x2715;</button>
    </div>
    <div class="ai-modal-body" style="overflow:visible">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label style="font-size:12px;color:#64748b;display:block;margin-bottom:4px">
            机场标识 (英文, 用于策略组命名)
          </label>
          <input id="add-name" type="text" placeholder="e.g. liangxin"
            style="width:100%;background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;
                   padding:8px 12px;border-radius:6px;font-size:14px">
        </div>
        <div>
          <label style="font-size:12px;color:#64748b;display:block;margin-bottom:4px">
            显示名称
          </label>
          <input id="add-display" type="text" placeholder="e.g. 良心机场"
            style="width:100%;background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;
                   padding:8px 12px;border-radius:6px;font-size:14px">
        </div>
        <div>
          <label style="font-size:12px;color:#64748b;display:block;margin-bottom:4px">
            订阅链接 (原始链接, 系统会通过 subconverter 转换)
          </label>
          <input id="add-url" type="text" placeholder="https://xxx.com/api/v1/client/subscribe?token=..."
            style="width:100%;background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;
                   padding:8px 12px;border-radius:6px;font-size:14px">
        </div>
        <div>
          <label style="font-size:12px;color:#64748b;display:block;margin-bottom:4px">
            插入位置 (在哪个机场后面, 留空则加到末尾)
          </label>
          <select id="add-after"
            style="width:100%;background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;
                   padding:8px 12px;border-radius:6px;font-size:14px">
            <option value="">末尾</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <input id="add-autoupdate" type="checkbox" checked>
          <label style="font-size:13px;color:#94a3b8">启用自动更新 (每6小时)</label>
        </div>
        <div id="add-error" style="color:#f87171;font-size:13px;display:none"></div>
        <button id="add-submit" onclick="submitAdd()"
          style="background:#312e81;border:1px solid #6d28d9;color:#a5b4fc;
                 padding:10px;border-radius:8px;font-size:14px;cursor:pointer;
                 transition:all .15s">
          获取节点并添加
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="ai-modal-backdrop" id="del-backdrop">
  <div class="ai-modal" style="width:min(420px,92vw)">
    <div class="ai-modal-head">
      <h4 id="del-title">确认删除</h4>
      <button class="ai-modal-close" onclick="closeDelModal()">&#x2715;</button>
    </div>
    <div class="ai-modal-body">
      <p>将从 Surge 配置中移除该机场的所有策略组引用, 并删除节点文件。此操作不可撤销。</p>
      <p id="del-detail" style="color:#fb923c;margin-top:8px"></p>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button onclick="closeDelModal()"
          style="flex:1;background:#1a1d27;border:1px solid #2d3148;color:#94a3b8;
                 padding:8px;border-radius:6px;cursor:pointer">取消</button>
        <button id="del-confirm" onclick="confirmDelete()"
          style="flex:1;background:#450a0a;border:1px solid #991b1b;color:#fca5a5;
                 padding:8px;border-radius:6px;cursor:pointer">删除</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let airports = {};
let nodeStatus = {};
let entryInfo = {};
let deletingName = '';

async function loadAirports() {
  const el = document.getElementById('airport-list');
  try {
    const [airRes, statusRes] = await Promise.all([
      fetch('/api/airports'),
      fetch('/api/airports/node-status'),
    ]);
    airports = await airRes.json();
    nodeStatus = statusRes.ok ? await statusRes.json() : {};
    renderAirports();
    populateInsertAfter();
    // Load entry-ip cache (24h server-side cache, instant if warm)
    loadEntryInfo();
  } catch(e) {
    el.innerHTML = '<p style="color:#f87171">加载失败</p>';
  }
}

async function loadEntryInfo(force) {
  const url = '/api/airports/entry-ip' + (force ? '?refresh=1' : '');
  try {
    const r = await fetch(url);
    if (r.ok) {
      entryInfo = await r.json();
      renderEntryBadges();
    }
  } catch(e) { console.warn('entry-ip fetch failed:', e); }
}

function renderEntryBadges() {
  for (const name of Object.keys(airports)) {
    const el = document.getElementById('entry-' + name);
    if (!el) continue;
    const info = entryInfo[name];
    if (!info) { el.innerHTML = ''; continue; }
    el.innerHTML = entryBadgeHtml(name, info);
  }
  // Update refresh button state
  const btn = document.getElementById('refresh-entry-btn');
  if (btn) { btn.disabled = false; btn.textContent = '刷新入口数据'; }
}

async function refreshEntryInfo() {
  const btn = document.getElementById('refresh-entry-btn');
  if (btn) { btn.disabled = true; btn.textContent = '分析中...'; }
  await loadEntryInfo(true);
}

function entryBadgeHtml(name, info) {
  const isRelay = info.type === 'relay';
  const tagColor = isRelay ? '#fbbf24' : '#60a5fa';
  const tagBg = isRelay ? '#422006' : '#172554';
  const tagBorder = isRelay ? '#92400e' : '#1e3a5f';
  const tagText = isRelay ? '中转' : '直连';

  // Summarize unique entry locations
  const locs = {};
  for (const e of info.entries) {
    if (!e.ip || e.ip === '127.0.0.1') continue;
    const label = e.country === 'China'
      ? (e.region || '中国') + ' ' + _shortIsp(e.isp)
      : (e.region || e.country);
    locs[label] = (locs[label] || 0) + 1;
  }
  const locSummary = Object.keys(locs).slice(0, 4).join(' / ');

  return `<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;margin-top:4px">
    <span style="background:${tagBg};border:1px solid ${tagBorder};color:${tagColor};
      padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600">${tagText}</span>
    <span style="color:#94a3b8">${locSummary}</span>
    <button onclick="toggleEntryDetail('${name}')" style="background:none;border:none;color:#64748b;
      cursor:pointer;font-size:11px;padding:0">▸ 详情</button>
  </span>
  <div id="entry-detail-${name}" style="display:none;margin-top:6px;font-size:11px;color:#94a3b8">
    ${info.entries.filter(e => e.ip !== '127.0.0.1').map(e => {
      const flag = e.country === 'China' ? '🇨🇳' : '';
      return `<div style="display:flex;gap:12px;padding:2px 0">
        <span style="color:#64748b;font-family:monospace;min-width:120px">${e.ip}</span>
        <span>${flag} ${e.region || e.country} ${_shortIsp(e.isp)}</span>
        <span style="color:#475569">${e.host}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function _shortIsp(isp) {
  if (!isp) return '';
  return isp
    .replace(/China Mobile communications? corporation/i, '移动')
    .replace(/China Mobile Communications Corporation/i, '移动')
    .replace(/CNC Group CHINA169.*$/i, '联通')
    .replace(/China Unicom.*$/i, '联通')
    .replace(/Chinanet/i, '电信')
    .replace(/China Telecom.*$/i, '电信')
    .replace(/Amazon\.com,? Inc\.?/i, 'AWS')
    .replace(/Amazon Technologies? Inc\.?/i, 'AWS')
    .replace(/Shenzhen lesuyun.*$/i, '乐速云')
    .replace(/PCCW.*$/i, 'PCCW');
}

function toggleEntryDetail(name) {
  const el = document.getElementById('entry-detail-' + name);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

const Q_CFG = {
  excellent: {color:'#34d399', label:'优秀'},
  good:      {color:'#60a5fa', label:'良好'},
  pass:      {color:'#fbbf24', label:'及格'},
  timeout:   {color:'#ef4444', label:'超时'},
};

function latencyColor(ms) {
  if (ms <= 0) return '#6b7280';
  if (ms < 200) return '#34d399';
  if (ms < 300) return '#60a5fa';
  return '#fbbf24';
}

function statusBar(s) {
  if (!s || !s.total) return '';
  const t = s.total;
  // Top line: alive / total
  const aliveColor = s.alive === t ? '#34d399' : s.alive > t/2 ? '#60a5fa' : '#f87171';
  // Quality segments within the bar
  const seg = [
    {n: s.excellent, c: '#34d399'},
    {n: s.good,      c: '#60a5fa'},
    {n: s.pass,      c: '#fbbf24'},
    {n: s.timeout,   c: '#ef4444'},
  ];
  const bar = seg.map(g =>
    g.n > 0 ? `<div style="width:${(g.n/t*100).toFixed(1)}%;height:100%;background:${g.c}"></div>` : ''
  ).join('');

  // Quality breakdown tags
  const tags = [];
  if (s.excellent) tags.push(`<span style="color:#34d399">${s.excellent} 优秀</span>`);
  if (s.good) tags.push(`<span style="color:#60a5fa">${s.good} 良好</span>`);
  if (s.pass) tags.push(`<span style="color:#fbbf24">${s.pass} 及格</span>`);
  if (s.timeout) tags.push(`<span style="color:#ef4444">${s.timeout} 超时</span>`);

  return `
    <div style="margin-top:8px">
      <div style="font-size:12px;margin-bottom:4px">
        可用 <b style="color:${aliveColor}">${s.alive}</b><span style="color:#64748b">/${t}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:0 0 200px;height:6px;background:#1e293b;border-radius:3px;overflow:hidden;display:flex">
          ${bar}
        </div>
        <span style="font-size:11px;display:flex;gap:8px;flex-wrap:wrap">${tags.join('')}</span>
      </div>
    </div>`;
}

function nodeTable(name, nodes) {
  if (!nodes || !nodes.length) return '<div style="color:#64748b;font-size:12px;padding:8px 0">无节点数据</div>';
  let html = `<div id="nodes-${name}" style="display:none;margin-top:10px">
    <table style="width:100%;font-size:12px;border-collapse:collapse">
      <thead><tr style="color:#64748b;text-align:left;border-bottom:1px solid #1e293b">
        <th style="padding:4px 8px">品质</th>
        <th style="padding:4px 8px">节点名称</th>
        <th style="padding:4px 8px">协议</th>
        <th style="padding:4px 8px;text-align:right">延迟</th>
      </tr></thead><tbody>`;
  for (const n of nodes) {
    const cfg = Q_CFG[n.quality] || Q_CFG.timeout;
    const badge = `<span style="color:${cfg.color};font-size:11px">${cfg.label}</span>`;
    const lat = n.latency > 0
      ? `<span style="color:${latencyColor(n.latency)}">${n.latency}ms</span>`
      : '<span style="color:#6b7280">—</span>';
    const errTip = n.error ? ` title="${n.error.replace(/"/g,'&quot;')}"` : '';
    html += `<tr style="border-bottom:1px solid #111827"${errTip}>
      <td style="padding:3px 8px">${badge}</td>
      <td style="padding:3px 8px;color:#cbd5e1;font-family:monospace">${n.name}</td>
      <td style="padding:3px 8px;color:#64748b">${n.type}</td>
      <td style="padding:3px 8px;text-align:right">${lat}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  return html;
}

function toggleNodes(name) {
  const el = document.getElementById('nodes-' + name);
  const btn = document.getElementById('toggle-' + name);
  if (!el) return;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.textContent = '收起节点';
  } else {
    el.style.display = 'none';
    btn.textContent = '展开节点';
  }
}

function renderAirports() {
  const el = document.getElementById('airport-list');
  const names = Object.keys(airports);
  if (!names.length) {
    el.innerHTML = '<p style="color:#64748b">暂无机场, 点击右上角添加</p>';
    return;
  }

  let html = '<div style="display:grid;gap:16px">';
  for (const name of names) {
    const a = airports[name];
    const s = nodeStatus[name] || {};
    const mtime = a.file_mtime ? new Date(a.file_mtime * 1000).toLocaleString('zh-CN') : '-';
    const autoTag = a.auto_update
      ? '<span style="color:#34d399;font-size:11px">自动更新</span>'
      : '<span style="color:#64748b;font-size:11px">手动</span>';

    html += `
    <div class="panel" style="padding-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div style="flex:1;min-width:200px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <span style="font-size:16px;font-weight:600;color:#f1f5f9">${a.display_name || name}</span>
            <span style="font-size:12px;color:#64748b;font-family:monospace">${name}</span>
            ${autoTag}
          </div>
          <div style="font-size:12px;color:#64748b;display:flex;gap:16px;flex-wrap:wrap">
            <span>节点: <b style="color:#a78bfa">${a.node_count || 0}</b></span>
            <span>文件更新: ${mtime}</span>
            ${a.file_exists ? '<span style="color:#34d399">文件正常</span>' : '<span style="color:#f87171">文件缺失</span>'}
          </div>
          ${s.total ? statusBar(s) : ''}
          <div id="entry-${name}" style="min-height:20px">
            <span style="font-size:11px;color:#475569">入口分析中...</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${s.total ? `<button id="toggle-${name}" onclick="toggleNodes('${name}')" class="range-btn" style="font-size:11px">展开节点</button>` : ''}
          <button onclick="refreshAirport('${name}')" class="range-btn" id="refresh-${name}">刷新节点</button>
          <button onclick="showDelModal('${name}','${a.display_name||name}')"
            class="range-btn" style="border-color:#991b1b;color:#fca5a5">删除</button>
        </div>
      </div>
      ${s.nodes ? nodeTable(name, s.nodes) : ''}
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function populateInsertAfter() {
  const sel = document.getElementById('add-after');
  sel.innerHTML = '<option value="">末尾</option>';
  for (const name of Object.keys(airports)) {
    sel.innerHTML += `<option value="${name}">${airports[name].display_name || name}</option>`;
  }
}

async function refreshAirport(name) {
  const btn = document.getElementById('refresh-' + name);
  if (btn) { btn.disabled = true; btn.textContent = '刷新中...'; }
  try {
    const r = await fetch(`/api/airports/${name}/refresh`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      btn.textContent = `${d.node_count} 节点`;
      setTimeout(() => loadAirports(), 1000);
    } else {
      alert(d.error || 'refresh failed');
      if(btn) { btn.disabled = false; btn.textContent = '刷新节点'; }
    }
  } catch(e) {
    alert('Error: ' + e);
    if(btn) { btn.disabled = false; btn.textContent = '刷新节点'; }
  }
}

function showAddModal() {
  document.getElementById('add-backdrop').classList.add('open');
  document.getElementById('add-error').style.display = 'none';
}
function closeAddModal() {
  document.getElementById('add-backdrop').classList.remove('open');
}

async function submitAdd() {
  const name = document.getElementById('add-name').value.trim();
  const display = document.getElementById('add-display').value.trim();
  const url = document.getElementById('add-url').value.trim();
  const after = document.getElementById('add-after').value;
  const autoUpdate = document.getElementById('add-autoupdate').checked;
  const errEl = document.getElementById('add-error');
  const btn = document.getElementById('add-submit');

  if (!name || !url) {
    errEl.textContent = '请填写机场标识和订阅链接';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '正在获取节点...';
  errEl.style.display = 'none';

  try {
    const r = await fetch('/api/airports', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name, display_name: display || name, subscribe_url: url,
        auto_update: autoUpdate, insert_after: after,
      })
    });
    const d = await r.json();
    if (d.ok) {
      closeAddModal();
      document.getElementById('add-name').value = '';
      document.getElementById('add-display').value = '';
      document.getElementById('add-url').value = '';
      loadAirports();
      if (d.errors && d.errors.length) {
        alert('添加成功 (' + d.node_count + ' 节点), 但有警告:\n' + d.errors.join('\n'));
      }
    } else {
      errEl.textContent = d.error || '添加失败';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Error: ' + e;
    errEl.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = '获取节点并添加';
}

function showDelModal(name, display) {
  deletingName = name;
  document.getElementById('del-detail').textContent = `机场: ${display} (${name})`;
  document.getElementById('del-backdrop').classList.add('open');
}
function closeDelModal() {
  document.getElementById('del-backdrop').classList.remove('open');
  deletingName = '';
}
async function confirmDelete() {
  if (!deletingName) return;
  const btn = document.getElementById('del-confirm');
  btn.disabled = true;
  btn.textContent = '删除中...';
  try {
    const r = await fetch(`/api/airports/${deletingName}`, {method:'DELETE'});
    const d = await r.json();
    if (d.ok) {
      closeDelModal();
      loadAirports();
      if (d.errors && d.errors.length) {
        alert('已删除, 但有警告:\n' + d.errors.join('\n'));
      }
    } else {
      alert(d.error || '删除失败');
    }
  } catch(e) {
    alert('Error: ' + e);
  }
  btn.disabled = false;
  btn.textContent = '删除';
}

// Highlight nav
document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));

loadAirports();
</script>
{% endblock %}

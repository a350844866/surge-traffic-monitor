{% extends "base.html" %}
{% block title %}设备详情 — Surge Monitor{% endblock %}
{% block content %}
<a class="back-link" href="/">← 返回总览</a>

<div class="page-header">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="page-title" id="dev-title">设备详情</div>
    <button class="ai-btn" id="ai-btn">✨ AI 分析</button>
  </div>
  <div class="date-picker">
    <div class="range-btns">
      <button class="range-btn active" data-range="1">今天</button>
      <button class="range-btn" data-range="7">近7天</button>
      <button class="range-btn" data-range="30">近30天</button>
      <button class="range-btn" data-range="month">本月</button>
    </div>
    <input type="date" id="date-start" value="{{ today }}">
    <span class="sep">—</span>
    <input type="date" id="date-end" value="{{ today }}">
  </div>
</div>

<div class="cards">
  <div class="card purple"><div class="label">总流量</div><div class="value" id="c-total">—</div></div>
  <div class="card blue"><div class="label">代理流量</div><div class="value" id="c-proxy">—</div></div>
  <div class="card green"><div class="label">直连流量</div><div class="value" id="c-direct">—</div></div>
  <div class="card"><div class="label">请求数</div><div class="value" id="c-req">—</div></div>
</div>

<div class="panel" style="margin-bottom:16px">
  <h3 id="trend-title">流量趋势</h3>
  <div id="chart-trend" class="chart"></div>
</div>

<div class="grid2">
  <div class="panel">
    <h3>策略分布</h3>
    <div id="chart-policy" style="width:100%;height:260px"></div>
  </div>
  <div class="panel">
    <h3>TOP 域名</h3>
    <table>
      <thead><tr><th>域名</th><th>策略</th><th>流量</th><th>请求</th></tr></thead>
      <tbody id="tbl-domains"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const mac = decodeURIComponent('{{ mac }}');
let trendChart, policyChart;

function initCharts() {
  trendChart  = echarts.init(document.getElementById('chart-trend'));
  policyChart = echarts.init(document.getElementById('chart-policy'));
}

function renderTrend(trend, start, end) {
  document.getElementById('trend-title').textContent =
    start === end ? '当日流量（按小时）' : '流量趋势（按天）';
  trendChart.setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'axis', formatter: (p) =>
      p[0].axisValue + '<br>' + p.map(x => x.marker + x.seriesName + ': ' + fmtBytes(x.value)).join('<br>')
    },
    legend: { data: ['下载', '上传'], textStyle: { color: '#94a3b8' } },
    grid: { left: 60, right: 20, top: 40, bottom: 30 },
    xAxis: { type: 'category', data: trend.map(r => r.day.slice(5)),
             axisLabel: { color: '#64748b', fontSize: 11 },
             axisLine: { lineStyle: { color: '#2d3148' } } },
    yAxis: { type: 'value', axisLabel: { color: '#64748b', fontSize: 11, formatter: v => fmtBytes(v) },
             splitLine: { lineStyle: { color: '#1e2130' } } },
    series: [
      { name: '下载', type: 'bar', stack: 'x', data: trend.map(r => r.download), itemStyle: { color: '#6d28d9' } },
      { name: '上传', type: 'bar', stack: 'x', data: trend.map(r => r.upload),   itemStyle: { color: '#1d4ed8' } },
    ]
  });
}

function renderPolicy(policies) {
  const colors = ['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899'];
  policyChart.setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'item', formatter: p => p.name + '<br>' + fmtBytes(p.value) + ' (' + p.percent + '%)' },
    legend: { orient: 'vertical', right: 0, top: 'center', textStyle: { color: '#94a3b8', fontSize: 12 } },
    series: [{
      type: 'pie', radius: ['40%', '70%'], center: ['40%', '50%'],
      data: policies.map((p, i) => ({ name: p.policy, value: p.total_bytes, itemStyle: { color: colors[i % colors.length] } })),
      label: { show: false },
    }]
  });
}

function renderDomains(domains) {
  document.getElementById('tbl-domains').innerHTML = domains.map(d => {
    return `<tr>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.host}">${d.host}</td>
      <td>${policyBadge(d.policy)}</td>
      <td>${fmtBytes(d.total_bytes)}</td>
      <td style="color:#64748b">${fmtNum(d.requests)}</td>
    </tr>`;
  }).join('');
}

async function load(start, end) {
  const res  = await fetch('/api/device/' + encodeURIComponent(mac) + rangeQuery(start, end));
  const data = await res.json();

  if (data.device) {
    const d = data.device;
    const name = d.name || d.dhcp_hostname || d.dns_name || mac;
    document.getElementById('dev-title').textContent = name + (d.current_ip ? ' (' + d.current_ip + ')' : '');
  }

  const s = data.summary || {};
  document.getElementById('c-total').textContent  = fmtBytes(s.total_bytes || 0);
  document.getElementById('c-proxy').textContent  = fmtBytes(s.proxy_bytes || 0);
  document.getElementById('c-direct').textContent = fmtBytes(s.direct_bytes || 0);
  document.getElementById('c-req').textContent    = fmtNum(s.requests || 0);

  if (data.trend?.length)    renderTrend(data.trend, start, end);
  if (data.policies?.length) renderPolicy(data.policies);
  renderDomains(data.top_domains || []);
}

initCharts();
const getRange = setupDateRange(load);
const r = getRange();
load(r.start, r.end);
window.addEventListener('resize', () => { trendChart?.resize(); policyChart?.resize(); });

document.getElementById('ai-btn').addEventListener('click', () => {
  const {start, end} = getRange();
  const devName = document.getElementById('dev-title').textContent;
  openAiModal('设备分析 — ' + devName,
    '/api/ai/device/' + encodeURIComponent(mac) + rangeQuery(start, end));
});
</script>
{% endblock %}
